<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a1118">
  <meta name="description" content="Personlig økonomi- og arbejdsregistrering til Windows og Samsung tablet.">
  <title>Min Økonomi & Arbejde</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="sidebar" aria-label="Hovedmenu">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></div>
        <div><strong>Min Økonomi</strong><br><strong>& Arbejde</strong></div>
      </div>

      <nav class="nav-groups">
        <div class="nav-group">
          <div class="nav-heading">ØKONOMI</div>
          <button class="nav-item active" data-route="economy-overview"><span class="nav-icon" data-icon="home"></span><span>Overblik</span></button>
          <button class="nav-item" data-route="incomes"><span class="nav-icon" data-icon="wallet"></span><span>Indkomster</span></button>
          <button class="nav-item" data-route="expenses"><span class="nav-icon" data-icon="pie"></span><span>Budget & Udgifter</span></button>
          <button class="nav-item" data-route="debts"><span class="nav-icon" data-icon="bank"></span><span>Gæld & Afdrag</span></button>
          <button class="nav-item" data-route="savings"><span class="nav-icon" data-icon="piggy"></span><span>Opsparing</span></button>
          <button class="nav-item" data-route="wishes"><span class="nav-icon" data-icon="heart"></span><span>Ønsker</span></button>
          <button class="nav-item" data-route="gifts"><span class="nav-icon" data-icon="gift"></span><span>Gaver</span></button>
          <button class="nav-item" data-route="sales"><span class="nav-icon" data-icon="tag"></span><span>Privat salg</span></button>
          <button class="nav-item" data-route="purchases"><span class="nav-icon" data-icon="cart"></span><span>Indkøb</span></button>
          <button class="nav-item" data-route="settings"><span class="nav-icon" data-icon="settings"></span><span>Indstillinger</span></button>
        </div>

        <div class="nav-group">
          <div class="nav-heading">ARBEJDE</div>
          <button class="nav-item" data-route="daily"><span class="nav-icon" data-icon="clipboard"></span><span>Daglig registrering</span></button>
          <button class="nav-item" data-route="work-overview"><span class="nav-icon" data-icon="briefcase"></span><span>Overblik</span></button>
          <button class="nav-item" data-route="calendar"><span class="nav-icon" data-icon="calendar"></span><span>Kalender</span></button>
          <button class="nav-item" data-route="paydays"><span class="nav-icon" data-icon="card"></span><span>Lønningsdage</span></button>
          <button class="nav-item" data-route="absence"><span class="nav-icon" data-icon="user-minus"></span><span>Fravær</span></button>
          <button class="nav-item" data-route="days-off"><span class="nav-icon" data-icon="sun"></span><span>Fridage</span></button>
          <button class="nav-item" data-route="vacation"><span class="nav-icon" data-icon="suitcase"></span><span>Ferie</span></button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="collapse-button" id="collapseButton"><span class="nav-icon" data-icon="chevrons-left"></span><span>Skjul menu</span></button>
        <div class="storage-status"><span class="status-dot"></span><span>Gemmes automatisk på enheden</span></div>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <div class="workspace">
      <header class="mobile-header">
        <button class="icon-button" id="menuButton" aria-label="Åbn menu"><span class="nav-icon" data-icon="menu"></span></button>
        <div class="mobile-brand">Min Økonomi & Arbejde</div>
        <button class="icon-button" id="quickAddButton" aria-label="Tilføj"><span class="nav-icon" data-icon="plus"></span></button>
      </header>
      <main class="main-content" id="pageContent" tabindex="-1"></main>
    </div>
  </div>

  <div class="modal-layer" id="modalLayer" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-header">
        <div>
          <h2 id="modalTitle">Tilføj</h2>
          <p id="modalSubtitle"></p>
        </div>
        <button class="icon-button" data-close-modal aria-label="Luk"><span class="nav-icon" data-icon="x"></span></button>
      </header>
      <form id="modalForm" class="modal-body"></form>
      <footer class="modal-footer">
        <button class="button secondary" type="button" data-close-modal>Annuller</button>
        <button class="button primary" type="submit" form="modalForm"><span class="nav-icon" data-icon="save"></span> Gem</button>
      </footer>
    </section>
  </div>

  <div class="toast-region" id="toastRegion" aria-live="polite"></div>
  <input type="file" id="importInput" accept="application/json" hidden>

  <script src="app.js"></script>
</body>
</html>
